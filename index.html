<script type="text/javascript">
        var gk_isXlsx = false;
        var gk_xlsxFileLookup = {};
        var gk_fileData = {};
        function filledCell(cell) {
          return cell !== '' && cell != null;
        }
        function loadFileData(filename) {
        if (gk_isXlsx && gk_xlsxFileLookup[filename]) {
            try {
                var workbook = XLSX.read(gk_fileData[filename], { type: 'base64' });
                var firstSheetName = workbook.SheetNames[0];
                var worksheet = workbook.Sheets[firstSheetName];

                // Convert sheet to JSON to filter blank rows
                var jsonData = XLSX.utils.sheet_to_json(worksheet, { header: 1, blankrows: false, defval: '' });
                // Filter out blank rows (rows where all cells are empty, null, or undefined)
                var filteredData = jsonData.filter(row => row.some(filledCell));

                // Heuristic to find the header row by ignoring rows with fewer filled cells than the next row
                var headerRowIndex = filteredData.findIndex((row, index) =>
                  row.filter(filledCell).length >= filteredData[index + 1]?.filter(filledCell).length
                );
                // Fallback
                if (headerRowIndex === -1 || headerRowIndex > 25) {
                  headerRowIndex = 0;
                }

                // Convert filtered JSON back to CSV
                var csv = XLSX.utils.aoa_to_sheet(filteredData.slice(headerRowIndex)); // Create a new sheet from filtered array of arrays
                csv = XLSX.utils.sheet_to_csv(csv, { header: 1 });
                return csv;
            } catch (e) {
                console.error(e);
                return "";
            }
        }
        return gk_fileData[filename] || "";
        }

  <script type="module">
    import * as THREE from 'https://esm.sh/three@0.160.0';
    import { Water } from 'https://esm.sh/three@0.160.0/examples/jsm/objects/Water.js';
    import { Sky }   from 'https://esm.sh/three@0.160.0/examples/jsm/objects/Sky.js';

    window.addEventListener('DOMContentLoaded', () => {
      const $ = id => document.getElementById(id);
      const diagEl = $('diag'), errEl = $('err');
      const diag = m => { console.log('[Diag]', m); if(diagEl) diagEl.textContent = '✓ ' + m; };
      const fail = m => { console.error('[Error]', m); if(errEl) errEl.textContent = '✕ ' + m; };

      try {
        console.assert(THREE && typeof THREE.WebGLRenderer === 'function', 'Three core OK');
        console.assert(typeof Sky === 'function', 'Sky OK');
        console.assert(typeof Water === 'function', 'Water OK');
        //diag('Imports OK via esm.sh');
      } catch(e) { fail('Falha nos imports: ' + e.message); }

      // --- Safe DOM binding (avoid null.onclick) ---
      const bind = (id, fn) => { const el = $(id); if (el) el.onclick = fn; else console.warn('Elemento não encontrado:', id); };

      let scene, camera, renderer, clock;
      let water, sunLight, sky;
      let boat, boatVel = new THREE.Vector3();
      let trailLine, trailPositions = [], trailMax = 350;
      let keys = {};
      let camMode = 0;
      const chaseCamPos = new THREE.Vector3(), camTarget = new THREE.Vector3();
      let lastPos = new THREE.Vector3(); let distanceMeters = 0; let speedMps = 0;
      let timeOfDay = 6, timeScale = 1.5;
      let listener, ambSound, bgmSound, muted = true;
      const mini = { ctx:null, scale:0.2 };

      init().catch(e => fail('Falha ao inicializar: ' + (e?.message||e)));

      async function init(){
        scene = new THREE.Scene();
        clock = new THREE.Clock();
        camera = new THREE.PerspectiveCamera(60, innerWidth/innerHeight, 0.5, 50000);
        camera.position.set(0,12,26);

        renderer = new THREE.WebGLRenderer({antialias:true});
        renderer.setPixelRatio(Math.min(devicePixelRatio,2));
        renderer.setSize(innerWidth, innerHeight);
        if (renderer.outputColorSpace !== undefined) {
          renderer.outputColorSpace = THREE.SRGBColorSpace;
        }
        document.body.appendChild(renderer.domElement);

        sunLight = new THREE.DirectionalLight(0xffffff, 1.0);
        sunLight.position.set(0,100,0);
        scene.add(new THREE.AmbientLight(0x506070, 0.6));
        scene.add(sunLight);

        sky = new Sky();
        sky.scale.setScalar(45000);
        scene.add(sky);
        const su = sky.material.uniforms;
        su.turbidity.value = 8; su.rayleigh.value = 1.3; su.mieCoefficient.value = 0.008; su.mieDirectionalG.value = 0.8;

        const waterNormals = await new Promise((resolve) => {
          new THREE.TextureLoader().load(
            'https://threejs.org/examples/textures/waternormals.jpg',
            (t)=>{ t.wrapS=t.wrapT=THREE.RepeatWrapping; resolve(t); }
          );
        });
        const waterGeo = new THREE.PlaneGeometry(100000,100000, 256,256);
        water = new Water(waterGeo, {
          textureWidth:1024, textureHeight:1024,
          waterNormals,
          alpha:1.0,
          sunDirection: sunLight.position.clone().normalize(),
          sunColor: 0xffffff,
          waterColor: 0x193f6a,
          distortionScale: 3.3,
          fog: false
        });
        water.rotation.x = -Math.PI/2;
        scene.add(water);

        // Barco
        boat = createBoat();
        boat.position.set(0,1.2,0);
        scene.add(boat);
        lastPos.copy(boat.position);

        // Trilho
        const trailGeo = new THREE.BufferGeometry();
        const posArr = new Float32Array(trailMax*3);
        trailGeo.setAttribute('position', new THREE.BufferAttribute(posArr,3));
        const trailMat = new THREE.LineBasicMaterial({ color:0xffffff, transparent:true, opacity:0.35 });
        trailLine = new THREE.Line(trailGeo, trailMat); trailLine.frustumCulled=false; scene.add(trailLine);

        // Áudio (tentativa de assets remotos -> fallback procedural)
        listener = new THREE.AudioListener(); camera.add(listener);
        ambSound = new THREE.Audio(listener);
        bgmSound = new THREE.Audio(listener);

        await tryLoadAudio(ambSound, 'https://cdn.pixabay.com/download/audio/2021/08/04/audio_c6bcf94544.mp3?filename=sea-waves-ambient-5394.mp3', 0.25).catch(()=>{});
        await tryLoadAudio(bgmSound, 'https://cdn.pixabay.com/download/audio/2022/03/15/audio_7e8a46f0b8.mp3?filename=ambient-piano-and-strings-10277.mp3', 0.20).catch(()=>{});

        // Fallbacks se 403/erro
        if (!ambSound.buffer) createProceduralSea(ambSound, 0.15);
        if (!bgmSound.buffer) createAmbientPad(bgmSound, 0.10);

        const resumeAudio = ()=>{
          if(!muted) return;
          muted=false; ambSound.play(); bgmSound.play();
          removeEventListener('pointerdown', resumeAudio); removeEventListener('keydown', resumeAudio);
        };
        addEventListener('pointerdown', resumeAudio); addEventListener('keydown', resumeAudio);

        // Input
        addEventListener('keydown', (e)=>{ keys[e.key.toLowerCase()] = true; if(e.key==='p'||e.key==='P') togglePause(); });
        addEventListener('keyup',   (e)=>{ keys[e.key.toLowerCase()] = false; });

        // Bind UI safely
        bind('btnPause', togglePause);
        bind('btnResume', togglePause);
        bind('btnMute', toggleMute);
        bind('btnCamera', ()=>{ camMode=(camMode+1)%3; });
        bind('btnTime', ()=>{ timeOfDay=(timeOfDay+3)%24; });
        bind('btnWeather', randomWeather);

        const rngAmb = $('rngAmb'); if(rngAmb) rngAmb.oninput = e => ambSound.setVolume(parseFloat(e.target.value));
        const rngBgm = $('rngBgm'); if(rngBgm) rngBgm.oninput = e => bgmSound.setVolume(parseFloat(e.target.value));
        const rngTS  = $('rngTimeScale'); if(rngTS) rngTS.oninput = e => timeScale = parseFloat(e.target.value);
        const selW   = $('selWeather'); if(selW) selW.onchange = e => setWeather(e.target.value);

        addEventListener('resize', onResize); onResize();

        mini.ctx = $('minimap')?.getContext('2d') || null;
        randomWeather();
        setTimeout(()=>{ const el=$('centerHint'); if(el) el.style.display='none'; }, 6000);

        console.assert(su && su.sunPosition, 'Sky uniform sunPosition OK');
        console.assert(water.material && 'time' in water.material.uniforms, 'Water uniform time OK');
        //diag('Cena inicializada');
        animate();
      }

      function createBoat(){
        const g = new THREE.Group();

        // Casco principal com formato mais realista
        const hullGeo = new THREE.BoxGeometry(5.0, 1.4, 12.0, 8, 4, 8);
        const hullMat = new THREE.MeshStandardMaterial({
          color: 0x965a38,
          metalness: 0.1,
          roughness: 0.8,
          envMapIntensity: 1.0
        });
        const hull = new THREE.Mesh(hullGeo, hullMat);
        hull.position.y = 0.7;
        g.add(hull);

        // Proa (frente) com inclinação
        const bowGeo = new THREE.BoxGeometry(4.6, 1.2, 3.0, 4, 2, 4);
        const bowMat = new THREE.MeshStandardMaterial({
          color: 0x8c5233,
          metalness: 0.1,
          roughness: 0.85
        });
        const bow = new THREE.Mesh(bowGeo, bowMat);
        bow.position.set(0, 0.75, -7.5);
        bow.rotation.x = 0.15;
        g.add(bow);

        // Cabine central
        const cabinGeo = new THREE.BoxGeometry(3.0, 1.8, 4.0, 4, 4, 4);
        const cabinMat = new THREE.MeshStandardMaterial({
          color: 0x6b3e26,
          metalness: 0.2,
          roughness: 0.7
        });
        const cabin = new THREE.Mesh(cabinGeo, cabinMat);
        cabin.position.set(0, 1.9, 0);
        g.add(cabin);

        // Mastro principal
        const mastGeo = new THREE.CylinderGeometry(0.15, 0.15, 7.5, 12);
        const mastMat = new THREE.MeshStandardMaterial({
          color: 0xe0e0e0,
          metalness: 0.0,
          roughness: 0.6
        });
        const mast = new THREE.Mesh(mastGeo, mastMat);
        mast.position.set(0, 4.0, -1.0);
        g.add(mast);

        // Vela principal com animação
        const sailGeo = new THREE.PlaneGeometry(4.2, 5.2, 8, 8);
        const sailMat = new THREE.MeshStandardMaterial({
          color: 0xf5f5f5,
          side: THREE.DoubleSide,
          transparent: true,
          opacity: 0.92,
          roughness: 0.9
        });
        const sail = new THREE.Mesh(sailGeo, sailMat);
        sail.position.set(2.1, 3.6, -1.0);
        sail.rotation.y = Math.PI / 2;
        g.add(sail);

        // Vela secundária (jib)
        const jibGeo = new THREE.PlaneGeometry(2.8, 3.8, 6, 6);
        const jib = new THREE.Mesh(jibGeo, sailMat);
        jib.position.set(1.4, 2.8, -5.5);
        jib.rotation.y = Math.PI / 2;
        g.add(jib);

        // Corrimãos
        const railGeo = new THREE.CylinderGeometry(0.05, 0.05, 8.0, 8);
        const railMat = new THREE.MeshStandardMaterial({
          color: 0xaaaaaa,
          metalness: 0.8,
          roughness: 0.4
        });
        const railLeft = new THREE.Mesh(railGeo, railMat);
        railLeft.position.set(2.2, 1.5, 0);
        railLeft.rotation.z = Math.PI / 2;
        g.add(railLeft);
        const railRight = railLeft.clone();
        railRight.position.x = -2.2;
        g.add(railRight);

        // Bandeira
        const flagGeo = new THREE.PlaneGeometry(1.2, 0.8, 4, 4);
        const flagMat = new THREE.MeshStandardMaterial({
          color: 0xff3333,
          side: THREE.DoubleSide,
          transparent: true,
          opacity: 0.95
        });
        const flag = new THREE.Mesh(flagGeo, flagMat);
        flag.position.set(0, 5.8, -6.0);
        g.add(flag);

        // Cordas (simples, linhas curvas)
        const ropeGeo = new THREE.BufferGeometry();
        const ropePos = new Float32Array(30 * 3);
        for (let i = 0; i < 30; i++) {
          const t = i / 29;
          ropePos[i * 3] = 0;
          ropePos[i * 3 + 1] = 4.0 - t * 1.5;
          ropePos[i * 3 + 2] = -1.0 - t * 4.5;
        }
        ropeGeo.setAttribute('position', new THREE.BufferAttribute(ropePos, 3));
        const ropeMat = new THREE.LineBasicMaterial({ color: 0x333333 });
        const rope = new THREE.Line(ropeGeo, ropeMat);
        g.add(rope);

        // Animação para vela e bandeira
        g.userData.update = (delta, time) => {
          const sailVertices = sail.geometry.attributes.position.array;
          for (let i = 0; i < sailVertices.length; i += 3) {
            const y = sailVertices[i + 1];
            sailVertices[i + 2] += Math.sin(time + y * 0.5) * 0.1 * (y / 5.2);
          }
          sail.geometry.attributes.position.needsUpdate = true;

          const jibVertices = jib.geometry.attributes.position.array;
          for (let i = 0; i < jibVertices.length; i += 3) {
            const y = jibVertices[i + 1];
            jibVertices[i + 2] += Math.sin(time + y * 0.7) * 0.08 * (y / 3.8);
          }
          jib.geometry.attributes.position.needsUpdate = true;

          const flagVertices = flag.geometry.attributes.position.array;
          for (let i = 0; i < flagVertices.length; i += 3) {
            const x = flagVertices[i];
            flagVertices[i + 2] += Math.sin(time + x * 1.2) * 0.15 * (x / 1.2);
          }
          flag.geometry.attributes.position.needsUpdate = true;
        };

        return g;
      }

      function tryLoadAudio(audio, url, vol=0.2){
        return new Promise((resolve, reject) => {
          const loader = new THREE.AudioLoader();
          loader.load(url, buffer => {
            audio.setBuffer(buffer);
            audio.setLoop(true);
            audio.setVolume(vol);
            resolve();
          }, undefined, err => {
            console.warn('Falha a carregar áudio, vou usar fallback:', url, err?.message||err);
            reject(err);
          });
        });
      }

      function createProceduralSea(audio, vol=0.15){
        const ctx = audio.listener.context;
        const dur = 2.0;
        const rate = ctx.sampleRate;
        const length = rate * dur;
        const buffer = ctx.createBuffer(1, length, rate);
        const data = buffer.getChannelData(0);
        let white = 0.0;
        for(let i=0; i<length; i++){
          const rnd = Math.random()*2-1;
          white = (white + 0.02*rnd) / 1.02;
          data[i] = white * 0.6;
        }
        audio.setBuffer(buffer);
        audio.setLoop(true);
        audio.setVolume(vol);
      }

      function createAmbientPad(audio, vol=0.1){
        const ctx = audio.listener.context;
        const dur = 4.0;
        const rate = ctx.sampleRate;
        const length = rate * dur;
        const buffer = ctx.createBuffer(1, length, rate);
        const data = buffer.getChannelData(0);
        const freqs = [220, 224, 330];
        for(let i=0; i<length; i++){
          const t = i/rate;
          let v = 0;
          for(const f of freqs){
            v += Math.sin(2*Math.PI*f*t);
          }
          const env = Math.min(t/0.5, 1) * Math.min((dur-t)/0.6, 1);
          data[i] = (v/3) * 0.25 * env;
        }
        audio.setBuffer(buffer);
        audio.setLoop(true);
        audio.setVolume(vol);
      }

      function onResize(){
        if(!camera || !renderer) return;
        camera.aspect = innerWidth/innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(innerWidth, innerHeight);
      }

      function togglePause(){
        const panel = document.getElementById('pausePanel');
        if(!panel) return;
        if(panel.style.display === 'grid' || panel.style.display === 'block'){
          panel.style.display = 'none';
          if(!muted){ ambSound.play(); bgmSound.play(); }
        } else {
          panel.style.display = 'grid';
          ambSound.pause(); bgmSound.pause();
        }
      }

      function toggleMute(){
        muted = !muted;
        const b = document.getElementById('btnMute'); if(b) b.textContent = muted ? '🔇' : '🔊';
        if(muted){ ambSound.pause(); bgmSound.pause(); }
        else { ambSound.play(); bgmSound.play(); }
      }

      function setWeather(preset){
        const u = sky.material.uniforms;
        if(preset === 'clear'){
          u.turbidity.value = 6; u.rayleigh.value = 1.2; u.mieCoefficient.value = 0.004; u.mieDirectionalG.value = 0.8;
          water.material.uniforms.waterColor.value.set(0x1a4b7a);
          water.material.uniforms.distortionScale.value = 3.3;
        } else if(preset === 'hazy'){
          u.turbidity.value = 12; u.rayleigh.value = 0.7; u.mieCoefficient.value = 0.012; u.mieDirectionalG.value = 0.7;
          water.material.uniforms.waterColor.value.set(0x345e80);
          water.material.uniforms.distortionScale.value = 2.4;
        } else if(preset === 'overcast'){
          u.turbidity.value = 16; u.rayleigh.value = 0.2; u.mieCoefficient.value = 0.02; u.mieDirectionalG.value = 0.9;
          water.material.uniforms.waterColor.value.set(0x2b4a66);
          water.material.uniforms.distortionScale.value = 1.8;
        } else if(preset === 'sunset'){
          u.turbidity.value = 14; u.rayleigh.value = 1.4; u.mieCoefficient.value = 0.02; u.mieDirectionalG.value = 0.85;
          water.material.uniforms.waterColor.value.set(0x274060);
          water.material.uniforms.distortionScale.value = 2.6;
        } else if(preset === 'random'){
          const presets = ['clear','hazy','overcast','sunset'];
          return setWeather(presets[(Math.random()*presets.length)|0]);
        }
      }

      function randomWeather(){ setWeather('random'); }

      function updateSun(delta){
        timeOfDay = (timeOfDay + delta * timeScale * 0.1) % 24;
        const phi = THREE.MathUtils.degToRad(90 - (timeOfDay/24)*180);
        const theta = THREE.MathUtils.degToRad((timeOfDay/24)*360);

        const sunVec = new THREE.Spherical(1, phi, theta);
        const sunDir = new THREE.Vector3().setFromSpherical(sunVec);

        sky.material.uniforms.sunPosition.value = sunDir.clone().multiplyScalar(40000);
        sunLight.position.copy(sunDir.clone().multiplyScalar(15000));
        sunLight.intensity = THREE.MathUtils.lerp(0.15, 1.2, Math.max(0, Math.sin(phi)));

        water.material.uniforms.sunDirection.value.copy(sunLight.position).normalize();
      }

      function handleInput(delta){
        const forward = new THREE.Vector3(0,0,-1).applyQuaternion(boat.quaternion);

        const accel = 6.0;
        const maxSpeed = 9.0;
        const turnRate = 0.7;

        if(keys['w'] || keys['arrowup']) boatVel.addScaledVector(forward, accel*delta);
        if(keys['s'] || keys['arrowdown']) boatVel.addScaledVector(forward, -accel*0.6*delta);

        const drag = 1.6;
        boatVel.multiplyScalar(Math.max(0, 1 - drag*delta));

        const v = boatVel.length();
        if(v > maxSpeed) boatVel.multiplyScalar(maxSpeed / v);

        const turn = (keys['a']||keys['arrowleft'] ? 1:0) - (keys['d']||keys['arrowright'] ? 1:0);
        const turnAmount = turn * turnRate * delta * THREE.MathUtils.clamp(v / maxSpeed, 0, 1);
        boat.rotateY(turnAmount);

        boat.position.addScaledVector(boatVel, delta);

        const t = performance.now()*0.001;
        boat.position.y = 1.1 + Math.sin(t*1.1)*0.08 + Math.cos(t*0.7)*0.05;
        boat.rotation.z = Math.sin(t*0.6)*0.02;
      }

      function updateCamera(delta){
        const v = boatVel.length();
        const forward = new THREE.Vector3(0,0,-1).applyQuaternion(boat.quaternion);

        if(camMode===0){
          const dist = 14 + THREE.MathUtils.clamp(v*0.6, 0, 8);
          chaseCamPos.copy(boat.position).addScaledVector(forward, -dist);
          chaseCamPos.y = boat.position.y + 7 + THREE.MathUtils.clamp(v*0.2, 0, 2);
        } else if(camMode===1){
          const dist = 9;
          chaseCamPos.copy(boat.position).addScaledVector(forward, -dist);
          chaseCamPos.y = boat.position.y + 5;
        } else {
          const dist = 18;
          const right = new THREE.Vector3(1,0,0).applyQuaternion(boat.quaternion);
          chaseCamPos.copy(boat.position).addScaledVector(forward, -dist).addScaledVector(right, 6*Math.sin(performance.now()*0.0006));
          chaseCamPos.y = boat.position.y + 9 + 2*Math.sin(performance.now()*0.0008);
        }

        camTarget.copy(boat.position).addScaledVector(forward, 6);
        camera.position.lerp(chaseCamPos, 0.08);
        camera.lookAt(camTarget);
      }

      function updateMetrics(delta){
        const moved = boat.position.clone().sub(lastPos);
        const d = moved.length();
        distanceMeters += d;
        lastPos.copy(boat.position);

        speedMps = boatVel.length();

        const speedKnots = speedMps * 1.94384;
        const distNm = distanceMeters / 1852;

        document.getElementById('spd').textContent = speedKnots.toFixed(1);
        document.getElementById('dst').textContent = distNm.toFixed(2);

        const hours = Math.floor(timeOfDay);
        const minutes = Math.floor((timeOfDay%1)*60);
        document.getElementById('tod').textContent = `${String(hours).padStart(2,'0')}:${String(minutes).padStart(2,'0')}`;
      }

      function updateTrail(){
        trailPositions.push(boat.position.clone());
        if(trailPositions.length > trailMax) trailPositions.shift();

        const arr = trailLine.geometry.attributes.position.array;
        let idx = 0;
        for(let i=0;i<trailMax;i++){
          const p = trailPositions[i] || trailPositions[0] || boat.position;
          arr[idx++] = p.x; arr[idx++] = 0.05; arr[idx++] = p.z;
        }
        trailLine.geometry.attributes.position.needsUpdate = true;
      }

      function drawMinimap(){
        const canvas = document.getElementById('minimap');
        if(!canvas) return;
        const ctx = mini.ctx || canvas.getContext('2d');
        mini.ctx = ctx;
        const w = ctx.canvas.width = ctx.canvas.clientWidth;
        const h = ctx.canvas.height = ctx.canvas.clientHeight;

        ctx.clearRect(0,0,w,h);
        ctx.save();

        const grd = ctx.createRadialGradient(w/2,h/2,20,w/2,h/2,70);
        grd.addColorStop(0, 'rgba(180,220,255,0.25)');
        grd.addColorStop(1, 'rgba(255,255,255,0.06)');
        ctx.fillStyle = grd;
        ctx.fillRect(0,0,w,h);

        ctx.translate(w/2, h/2);

        ctx.strokeStyle = 'rgba(255,255,255,0.6)';
        ctx.lineWidth = 2;
        ctx.beginPath();
        for(let i=0;i<trailPositions.length;i++){
          const p = trailPositions[i]; if(!p) continue;
          const x = p.x * mini.scale; const y = p.z * mini.scale;
          if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
        }
        ctx.stroke();

        ctx.fillStyle = '#ffffff';
        const bx = boat.position.x * mini.scale;
        const by = boat.position.z * mini.scale;
        ctx.beginPath(); ctx.arc(bx, by, 3.5, 0, Math.PI*2); ctx.fill();

        ctx.restore();
      }

      function animate(){
        requestAnimationFrame(animate);
        const delta = Math.min(0.033, clock.getDelta());
        const time = performance.now() * 0.001;

        water.material.uniforms['time'].value += delta;

        handleInput(delta);
        updateCamera(delta);
        updateSun(delta);
        updateMetrics(delta);
        updateTrail();
        drawMinimap();

        // Atualizar animações do barco
        if (boat.userData.update) {
          boat.userData.update(delta, time);
        }

        renderer.render(scene, camera);
      }
    });
  </script>
</body>
</html>
